<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuNPartener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    /* ── Phase 1: message ── */
    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      max-width: 640px;
      width: 90%;
      opacity: 1;
      transition: opacity 0.8s ease;
    }
    #message.hide { opacity: 0; pointer-events: none; }

    #typetext {
      font-size: clamp(1.2rem, 3vw, 1.75rem);
      font-weight: 300;
      color: #2c2c2c;
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    #cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #2c3e6b;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Phase 2: logo reveal ── */
    #logo-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 28px;
      opacity: 0;
    }

    #logo-icon {
      width: 110px;
      height: 110px;
      object-fit: contain;
      opacity: 0;
      transform: scale(0.6) rotate(-8deg);
      transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.34,1.56,0.64,1);
    }
    #logo-icon.show {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    #logo-text {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    #logo-name {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 600;
      color: #1e2d4f;
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      max-width: 0;
      transition: max-width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    #logo-name.show { max-width: 500px; }

    #logo-sub {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #logo-sub.show { opacity: 1; transform: translateY(0); }

    #logo-sub span:first-child {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      font-weight: 400;
      color: #5a6a8a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #logo-sub span:last-child {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(0.55rem, 1.2vw, 0.72rem);
      font-weight: 300;
      color: #8a9ab5;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── thin divider line between icon and text ── */
    #divider {
      width: 1px;
      height: 80px;
      background: #c5cfe0;
      opacity: 0;
      transition: opacity 0.5s ease;
      flex-shrink: 0;
    }
    #divider.show { opacity: 1; }

    /* ── fade the whole logo wrap ── */
    #logo-wrap {
      transition: opacity 0.5s ease;
    }
    #logo-wrap.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Phase 1 -->
  <div id="message">
    <p id="typetext"><span id="cursor"></span></p>
  </div>

  <!-- Phase 2 -->
  <div id="logo-wrap">
    <img id="logo-icon" src="logoonly.png" alt="BuNPartener logo">
    <div id="divider"></div>
    <div id="logo-text">
      <div id="logo-name">BuNPartener</div>
      <div id="logo-sub">
        <span>Berliba și Partenerii</span>
        <span>Birou asociat de avocați</span>
      </div>
    </div>
  </div>

  <script>
    const MSG = 'Un mesaj, pentru siguranța ta juridică, din partea Biroului asociat de avocați.';
    const CHAR_SPEED = 38; // ms per character

    const typetext = document.getElementById('typetext');
    const cursor   = document.getElementById('cursor');
    const message  = document.getElementById('message');
    const logoWrap = document.getElementById('logo-wrap');
    const logoIcon = document.getElementById('logo-icon');
    const divider  = document.getElementById('divider');
    const logoName = document.getElementById('logo-name');
    const logoSub  = document.getElementById('logo-sub');

    function type(i) {
      if (i <= MSG.length) {
        typetext.textContent = MSG.slice(0, i);
        typetext.appendChild(cursor);
        setTimeout(() => type(i + 1), CHAR_SPEED);
      } else {
        // pause, then hide cursor and fade out message
        setTimeout(() => {
          cursor.style.display = 'none';
          setTimeout(() => {
            message.classList.add('hide');
            setTimeout(revealLogo, 800);
          }, 600);
        }, 900);
      }
    }

    function revealLogo() {
      logoWrap.classList.add('show');

      // icon pops in
      setTimeout(() => logoIcon.classList.add('show'), 100);

      // divider slides in
      setTimeout(() => divider.classList.add('show'), 400);

      // name sweeps in
      setTimeout(() => logoName.classList.add('show'), 550);

      // subtitle fades in
      setTimeout(() => logoSub.classList.add('show'), 1400);
    }

    // start after brief pause
    setTimeout(() => type(0), 600);
  </script>
</body>
</html>
