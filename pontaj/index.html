<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pontaj — Evidență Ore Facturabile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"
    onerror="document.getElementById('loading-screen').style.display='none';document.getElementById('auth-screen').style.display='flex';document.getElementById('auth-screen').innerHTML='<div style=\'text-align:center;padding:60px 24px;font-family:DM Sans,sans-serif;color:#C8A96E\'><div style=\'font-size:48px;letter-spacing:0.2em;font-family:Cormorant Garamond,serif;margin-bottom:24px\'>PONTAJ</div><p style=\'color:#8B949E;font-size:14px\'>Eroare: nu s-a putut încărca librăria Supabase.<br>Verificați conexiunea la internet și reîncărcați pagina.</p><button onclick=\'location.reload()\' style=\'margin-top:20px;padding:10px 24px;background:#C8A96E;border:none;border-radius:7px;color:#0D1117;font-size:14px;font-weight:600;cursor:pointer\'>Reîncarcă</button></div>'">
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --surface2: #21262D;
      --gold: #C8A96E;
      --gold-dim: rgba(200,169,110,0.12);
      --text: #E6EDF3;
      --muted: #8B949E;
      --border: #30363D;
      --green: #3FB950;
      --red: #F85149;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
    }

    /* ── LOADING ── */
    #loading-screen {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .loading-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--gold);
    }
    .loading-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--gold);
      border-radius: 50%;
      margin: 0 3px;
      opacity: 0.3;
      animation: blink 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

    /* ── AUTH ── */
    #auth-screen {
      display: none;
      min-height: 100dvh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 40px 24px;
      gap: 40px;
    }

    .auth-brand { text-align: center; }
    .auth-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(64px, 14vw, 100px);
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--gold);
      line-height: 1;
    }
    .auth-rule { width: 60px; height: 1px; background: var(--gold); margin: 14px auto; opacity: 0.4; }
    .auth-sub { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      width: 100%;
      max-width: 380px;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .auth-tab.active { color: var(--gold); border-color: var(--gold); }

    .auth-fields { display: flex; flex-direction: column; gap: 14px; }

    .auth-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 5px;
      display: block;
    }
    .auth-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: var(--gold); }
    .auth-input::placeholder { color: var(--muted); }

    .auth-submit {
      width: 100%;
      background: var(--gold);
      border: none;
      border-radius: 7px;
      color: #0D1117;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }
    .auth-submit:hover { opacity: 0.85; }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-msg {
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }
    .auth-msg.error { color: var(--red); }
    .auth-msg.success { color: var(--green); }

    /* ── APP SHELL ── */
    #app-shell { display: none; }
    #app-shell.visible { display: flex; flex-direction: column; min-height: 100dvh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .header-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--gold);
    }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-user { font-size: 13px; color: var(--muted); }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-primary {
      background: var(--gold);
      border: none;
      border-radius: 6px;
      color: #0D1117;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary:hover { opacity: 0.85; }

    main {
      flex: 1;
      padding: 32px;
      max-width: 1120px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toggle-group {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }
    .toggle-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 18px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.active { background: var(--gold); color: var(--bg); }

    /* ── STATS ── */
    .stats-row { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 22px;
      flex: 1;
      min-width: 140px;
    }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 600; color: var(--gold); line-height: 1; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }

    /* ── FORM ── */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 24px;
      margin-bottom: 24px;
    }
    .form-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 16px; }
    .form-grid {
      display: grid;
      grid-template-columns: 150px 90px 1fr 1.5fr auto;
      gap: 12px;
      align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); }
    .field input, .field select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .field input:focus, .field select:focus { border-color: var(--gold); }
    .field input::placeholder { color: var(--muted); }

    /* ── TABLE ── */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .table-title { font-size: 13px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 500;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--surface2); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .td-hours { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--gold); }
    .td-date { color: var(--muted); font-size: 13px; }
    .td-money { font-size: 13px; color: var(--muted); }

    .btn-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 14px;
      transition: color 0.15s;
      line-height: 1;
    }
    .btn-delete:hover { color: var(--red); }

    /* ── TIMER ── */
    .timer-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .timer-bar.running { border-color: var(--green); background: rgba(63,185,80,0.06); }
    .timer-left { display: flex; align-items: center; gap: 14px; }
    .timer-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .timer-bar.running .timer-dot { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .timer-display {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .timer-bar.running .timer-display { color: var(--green); }
    .timer-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.1em; }
    .btn-timer-start {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-timer-start:hover { border-color: var(--green); color: var(--green); }
    .btn-timer-stop {
      background: var(--green);
      border: none;
      color: #0D1117;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-timer-stop:hover { opacity: 0.85; }

    /* ── DATE RANGE PICKER ── */
    .range-picker {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .range-presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .preset-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .preset-chip:hover { border-color: var(--gold); color: var(--gold); }
    .range-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
    }
    .range-date-input {
      background: none;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      padding: 4px 2px;
    }
    .range-date-input::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    .range-sep { color: var(--muted); font-size: 14px; }

    .empty-state { text-align: center; padding: 56px 24px; color: var(--muted); }
    .empty-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── ADMIN: lawyer cards ── */
    .lawyer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .lsc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .lsc:hover { border-color: var(--gold); transform: translateY(-1px); }
    .lsc.active { border-color: var(--gold); background: var(--gold-dim); }
    .lsc.dashed { border-style: dashed; }
    .lsc-name { font-weight: 600; font-size: 15px; margin-bottom: 12px; }
    .lsc-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-top: 5px; }
    .lsc-row span:last-child { color: var(--text); font-variant-numeric: tabular-nums; }

    /* rate edit inside card */
    .rate-input {
      width: 64px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 3px 6px;
      outline: none;
      text-align: right;
    }
    .rate-input:focus { border-color: var(--gold); }

    /* ── INVITE INFO BOX ── */
    .invite-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .invite-box p { font-size: 13px; color: var(--muted); }
    .invite-box strong { color: var(--text); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 740px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    .modal-head-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--gold); white-space: nowrap; }
    .modal-actions { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
    .report-body { padding: 32px 36px; position: relative; }

    /* ── PRINT ── */
    @media print {
      body { background: white; color: #111; }
      header, .modal-actions, .btn-ghost, .btn-primary { display: none !important; }
      .modal-overlay { position: static; padding: 0; background: none; }
      .modal { border: none; max-height: none; box-shadow: none; }
      .modal-head { border-bottom: 2px solid #111; }
      .modal-head-title { color: #111; }
      .report-body { padding: 24px 0; }
      :root {
        --text: #111; --muted: #555; --gold: #7a5c1e;
        --border: #ddd; --surface2: #f5f5f5; --gold-dim: #f9f4ea;
        --bg: white; --surface: white;
      }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      main { padding: 20px 16px; }
      header { padding: 0 16px; }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid > *:nth-child(3),
      .form-grid > *:nth-child(4),
      .form-grid > *:nth-child(5) { grid-column: span 2; }
    }
  </style>
</head>
<body>

<!-- ══ LOADING ══ -->
<div id="loading-screen">
  <div class="loading-logo">PONTAJ</div>
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <div id="loading-cancel" style="display:none;margin-top:24px;text-align:center">
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Conexiunea durează mai mult decât de obicei...</p>
    <button onclick="showLoginScreen()" style="background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 20px;border-radius:7px;cursor:pointer">Mergi la autentificare</button>
  </div>
</div>

<!-- ══ AUTH ══ -->
<div id="auth-screen">
  <div class="auth-brand">
    <div class="auth-logo">PONTAJ</div>
    <div class="auth-rule"></div>
    <div class="auth-sub">Evidență ore facturabile</div>
  </div>

  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Autentificare</button>
      <button class="auth-tab" id="tab-register" onclick="showTab('register')">Cont nou</button>
    </div>

    <!-- Login form -->
    <div id="form-login" class="auth-fields">
      <div>
        <label class="auth-label">Email</label>
        <input type="email" id="l-email" class="auth-input" placeholder="email@firma.md" onkeydown="if(event.key==='Enter')login()">
      </div>
      <div>
        <label class="auth-label">Parolă</label>
        <input type="password" id="l-password" class="auth-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="auth-submit" id="btn-login" onclick="login()">Autentificare</button>
      <div class="auth-msg" id="login-msg"></div>
    </div>

    <!-- Register form -->
    <div id="form-register" class="auth-fields" style="display:none">
      <div>
        <label class="auth-label">Nume complet</label>
        <input type="text" id="r-name" class="auth-input" placeholder="Prenume Nume">
      </div>
      <div>
        <label class="auth-label">Email</label>
        <input type="email" id="r-email" class="auth-input" placeholder="email@firma.md">
      </div>
      <div>
        <label class="auth-label">Parolă (min. 6 caractere)</label>
        <input type="password" id="r-password" class="auth-input" placeholder="••••••••">
      </div>
      <div>
        <label class="auth-label">Tarif orar (EUR/h)</label>
        <input type="number" id="r-rate" class="auth-input" value="150" min="0" step="50">
      </div>
      <button class="auth-submit" id="btn-register" onclick="register()">Creare cont</button>
      <div class="auth-msg" id="register-msg"></div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app-shell">
  <header>
    <div class="header-brand">PONTAJ</div>
    <div class="header-right">
      <span class="header-user" id="headerUser"></span>
      <span id="header-mode-toggle"></span>
      <button class="btn-ghost" onclick="logout()">Deconectare</button>
    </div>
  </header>
  <main id="main-content"></main>
</div>

<!-- ══ REPORT MODAL ══ -->

function dbTimeout(promise, ms = 14000) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
  ]);
}

async function loadAll() {
  try {
    // Auth check is fast (separate service from DB)
    const { data: { user } } = await dbTimeout(db.auth.getUser(), 8000);
    if (!user) { showLoginScreen(); return; }

    // Use cached profile to show the app instantly on return visits
    const cached = localStorage.getItem('pontaj_profile');
    if (cached) {
      currentUser = JSON.parse(cached);
      allUsers    = JSON.parse(localStorage.getItem('pontaj_users_cache')  || '[]');
      allEntries  = JSON.parse(localStorage.getItem('pontaj_entries_cache') || '[]');
      showApp();
      // Refresh in background — user already sees the UI
      refreshInBackground(user.id);
    } else {
      // First ever login — must wait for DB
      await fetchAndShow(user.id);
    }
  } catch (e) {
    showLoginScreen();
  }
}

async function fetchAndShow(userId) {
  try {
    const { data: profile, error: pe } = await dbTimeout(
      db.from('profiles').select('*').eq('id', userId).single()
    );
    if (!profile || pe) { db.auth.signOut(); showLoginScreen(); return; }
    currentUser = profile;
    localStorage.setItem('pontaj_profile', JSON.stringify(profile));

    const [usersRes, entriesRes] = await dbTimeout(Promise.all([
      db.from('profiles').select('*').order('name'),
      db.from('entries').select('*').order('date', { ascending: false })
    ]));
    allUsers   = usersRes.data || [];
    allEntries = entriesRes.data || [];
    localStorage.setItem('pontaj_users_cache',   JSON.stringify(allUsers));
    localStorage.setItem('pontaj_entries_cache', JSON.stringify(allEntries));
    showApp();
  } catch (e) {
    showLoginScreen();
  }
}

async function refreshInBackground(userId) {
  try {
    const [profileRes, usersRes, entriesRes] = await Promise.all([
      db.from('profiles').select('*').eq('id', userId).single(),
      db.from('profiles').select('*').order('name'),
      db.from('entries').select('*').order('date', { ascending: false })
    ]);
    if (profileRes.data) {
      currentUser = profileRes.data;
      localStorage.setItem('pontaj_profile', JSON.stringify(currentUser));
    }
    allUsers   = usersRes.data   || [];
    allEntries = entriesRes.data || [];
    localStorage.setItem('pontaj_users_cache',   JSON.stringify(allUsers));
    localStorage.setItem('pontaj_entries_cache', JSON.stringify(allEntries));
    render(); // Re-render silently with fresh data

    // Silent — cached data already showing
  }
}

function getWeekRange() {
  const base = new Date();

  const sun  = new Date(mon);  sun.setDate(mon.getDate() + 6);
  return { start: mon.toISOString().split('T')[0], end: sun.toISOString().split('T')[0] };
}

function getMonthRange(year, month) {
  const start = `${year}-${String(month).padStart(2,'0')}-01`;
  const last  = new Date(year, month, 0).getDate();
  return { start, end: `${year}-${String(month).padStart(2,'0')}-${String(last).padStart(2,'0')}` };
}

function fmtDate(s) {

function fmtMoney(n) {

function quickRange(preset) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  const today = now.toISOString().split('T')[0];
  if (preset === 'week') {
    const day = now.getDay() || 7;
    const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    setDateRange(mon.toISOString().split('T')[0], sun.toISOString().split('T')[0]);
  } else if (preset === 'month') {
    const last = new Date(y, m, 0).getDate();
    setDateRange(`${y}-${String(m).padStart(2,'0')}-01`, `${y}-${String(m).padStart(2,'0')}-${String(last).padStart(2,'0')}`);
  } else if (preset === 'lastmonth') {
    const pm = m === 1 ? 12 : m - 1, py = m === 1 ? y - 1 : y;
    const last = new Date(py, pm, 0).getDate();
    setDateRange(`${py}-${String(pm).padStart(2,'0')}-01`, `${py}-${String(pm).padStart(2,'0')}-${String(last).padStart(2,'0')}`);
  } else if (preset === '30d') {
    const from = new Date(now); from.setDate(now.getDate() - 29);
    setDateRange(from.toISOString().split('T')[0], today);
  }
}

let timerInterval = null;

function getTimerStart() {
  const v = localStorage.getItem('pontaj_timer_start');
  return v ? parseInt(v) : null;
}

function fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function startTimer() {
  localStorage.setItem('pontaj_timer_start', Date.now().toString());
  render();
  tickTimer();
}

function stopTimer() {
  const start = getTimerStart();
  if (!start) return;
  const elapsedH = (Date.now() - start) / 3600000;
  const rounded  = Math.max(0.1, Math.round(elapsedH * 10) / 10);
  localStorage.removeItem('pontaj_timer_start');
  clearInterval(timerInterval);
  timerInterval = null;
  render();
  const hoursEl = document.getElementById('f-hours');
  const descEl  = document.getElementById('f-desc');
  if (hoursEl) hoursEl.value = rounded;
  if (descEl)  descEl.focus();
}

function tickTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const start = getTimerStart();
    if (!start) { clearInterval(timerInterval); return; }
    const el = document.getElementById('timer-display');
    if (el) el.textContent = fmtElapsed(Date.now() - start);
  }, 1000);
}

(function resumeTimer() { if (getTimerStart()) tickTimer(); })();

async function addEntry() {
  const user          = getCurrentUser();
  const date          = document.getElementById('f-date').value;
  const client        = document.getElementById('f-client').value.trim();
  const description   = document.getElementById('f-desc').value.trim();
  const fixedPriceRaw = document.getElementById('f-fixed-price').value;
  const fixedType     = document.getElementById('f-fixed-type').value || null;
  const isFixed       = fixedPriceRaw !== '';
  const fixedPrice    = isFixed ? Number(fixedPriceRaw) : null;
  const hours         = isFixed ? 0 : parseFloat(document.getElementById('f-hours').value);

  if (!date || !description) {
    alert('Completează data și descrierea activității.'); return;
  }
  if (!isFixed && (!hours || hours <= 0)) {
    alert('Completează numărul de ore sau alege o activitate predefinită.'); return;

  const { data, error } = await db.from('entries').insert({
    user_id:     user.id,
    date, hours, client, description,
    fixed_price: fixedPrice,
    fixed_type:  fixedType,

}

                   .sort((a,b) => b.date.localeCompare(a.date));

  const periodLabel = `${fmtDate(state.dateStart)} — ${fmtDate(state.dateEnd)}`;
  const totalAllHours = sumH(filterEntries(allEntries, state.dateStart, state.dateEnd, null));

  document.getElementById('main-content').innerHTML = `
    <div class="controls" style="flex-direction:column;align-items:flex-start;gap:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:10px;">
        ${rangePicker()}
        <button class="btn-primary" onclick="showReportForm()">Generează raport</button>
      </div>
    </div>

    <div class="lawyer-grid">
      ${lawyers.map(u => {
        const uEntries = filterEntries(allEntries, state.dateStart, state.dateEnd, u.id);
        const uH = sumH(uEntries);
        const uM = uEntries.reduce((s,e) => s + (e.fixed_price != null ? e.fixed_price : Number(e.hours) * u.rate), 0);
        return `
          <div class="lsc ${state.filterUser===u.id?'active':''}" onclick="setFilterUser('${u.id}')">
            <div class="lsc-name">${u.name}</div>
            <div class="lsc-row"><span>Ore</span><span>${uH.toFixed(1)} h</span></div>
            <div class="lsc-row"><span>Total</span><span>${fmtMoney(uM)}</span></div>
            <div class="lsc-row">
              <span>Tarif</span>
              <span>
                <input class="rate-input" type="number" value="${u.rate}" min="0" step="50"
                  onclick="event.stopPropagation()"
                  onchange="event.stopPropagation(); updateRate('${u.id}', this.value)">
                EUR/h
              </span>
            </div>
          </div>
        `;
      }).join('')}
      <div class="lsc dashed ${state.filterUser==='all'?'active':''}" onclick="setFilterUser('all')">
        <div class="lsc-name" style="color:var(--muted)">Toți avocații</div>
        <div class="lsc-row"><span>Total ore</span><span>${totalAllHours.toFixed(1)} h</span></div>
      </div>
    </div>

    <div class="invite-box">
      <p>Avocații noi se înregistrează la <strong>bunpartener.md/pontaj</strong> → fila "Cont nou".</p>
      <button class="btn-ghost" onclick="navigator.clipboard.writeText('bunpartener.md/pontaj').then(()=>this.textContent='Copiat!').catch(()=>{})">Copiază link</button>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">
          ${state.filterUser==='all' ? 'Toate intrările' : `Intrările lui ${userMap[state.filterUser]?.name || ''}`}
          — ${fmtDate(state.dateStart)} — ${fmtDate(state.dateEnd)}
        </span>
        ${filtered.length ? `<span style="font-size:13px;color:var(--muted)">${filtered.length} intrări · ${sumH(filtered).toFixed(1)}h</span>` : ''}
      </div>
      ${filtered.length === 0
        ? `<div class="empty-state"><div class="empty-icon">📋</div><p>Nicio intrare pentru această perioadă.</p></div>`
        : `<table>
            <thead><tr>
              <th style="width:100px">Data</th>
              <th>Avocat</th>
              <th>Client / Dosar</th>
              <th>Descriere</th>
              <th style="width:90px">Ore / Valoare</th>
              <th style="width:40px"></th>
            </tr></thead>
            <tbody>
              ${filtered.map(e => {
                const u = userMap[e.user_id];
                const val = e.fixed_price != null ? fmtMoney(e.fixed_price) : Number(e.hours).toFixed(1) + 'h';
                return `
                  <tr>
                    <td class="td-date">${fmtDate(e.date)}</td>
                    <td style="font-weight:500;font-size:13px">${u?.name || '—'}</td>
                    <td style="color:var(--muted);font-size:13px">${e.client || '—'}</td>
                    <td style="font-size:14px">${e.description}</td>
                    <td class="td-hours">${val}</td>
                    <td><button class="btn-delete" onclick="deleteEntry('${e.id}')" title="Șterge">✕</button></td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>`
      }
    </div>
  `;
}

async function updateRate(userId, rawRate) {
  const rate = parseFloat(rawRate);
  if (!rate || rate < 0) return;
  const { error } = await db.from('profiles').update({ rate }).eq('id', userId);
  if (error) { alert(error.message); return; }
  const u = allUsers.find(u => u.id === userId);
  if (u) u.rate = rate;
}

    ${actTemplates.map(t => `<option value="${t.id}">${t.name}</option>`).join('')}

function currentFormData() {
  return {
    firm:        document.getElementById('rf-firm').value.trim(),
    coordinator: document.getElementById('rf-coordinator').value.trim(),
    idno:        document.getElementById('rf-idno').value.trim(),
    ibanMdl:     document.getElementById('rf-iban-mdl').value.trim(),
    bank:        document.getElementById('rf-bank').value.trim(),
  };
}

function applyActTemplate() {
  const sel = document.getElementById('tpl-select');
  if (!sel?.value) return;
  const tpl = actTemplates.find(t => t.id === sel.value);
  if (!tpl) return;
  const d = tpl.data;
  document.getElementById('rf-firm').value        = d.firm        || '';
  document.getElementById('rf-coordinator').value = d.coordinator || '';
  document.getElementById('rf-idno').value        = d.idno        || '';
  document.getElementById('rf-iban-mdl').value    = d.ibanMdl     || '';
  document.getElementById('rf-bank').value        = d.bank        || '';
}

async function saveActTemplate() {
  const name = prompt('Nume template:');
  if (!name?.trim()) return;
  const { data, error } = await db.from('act_templates').insert({
    user_id: currentUser.id,
    name: name.trim(),
    data: currentFormData(),
  }).select().single();
  if (error) { alert(error.message); return; }
  actTemplates.push(data);
  actTemplates.sort((a,b) => a.name.localeCompare(b.name));
  renderTemplateBar();
}


async function deleteActTemplate() {
  const sel = document.getElementById('tpl-select');
  if (!sel?.value) return;
  const tpl = actTemplates.find(t => t.id === sel.value);
  if (!tpl || !confirm(`Ștergi template-ul "${tpl.name}"?`)) return;
  const { error } = await db.from('act_templates').delete().eq('id', tpl.id);
  if (error) { alert(error.message); return; }
  actTemplates = actTemplates.filter(t => t.id !== tpl.id);
  renderTemplateBar();
}

      <p style="margin-bottom:8px;"><strong>2. CLIENTUL confirmă:</strong></p>
      <p style="margin-bottom:4px;text-align:justify;">a) faptul lipsei pretenţiilor de ordin material şi/sau juridic faţă de EXECUTOR pentru perioada vizată (${periodDisplay}),</p>
      <p style="margin-bottom:4px;text-align:justify;">b) disponibilitatea de a achita cheltuielile suportate de către ${firmDisplay} în conformitate cu condițiile contractuale prestabilite și potrivit prezentului Act,</p>
      <p style="margin-bottom:16px;text-align:justify;">c) acordarea încrederii față de avocat referitor la asigurarea asistenței și reprezentării juridice în continuare a intereselor CLIENTULUI.</p>
      <p style="margin-bottom:12px;text-align:justify;"><strong>3. EXECUTORUL</strong> își asumă obligația${contractNr ? `, conform contractului de asistență juridică nr. ${contractNr} din ${contractDateFmt},` : ''} să asigure în continuare asistența și reprezentarea juridică a intereselor CLIENTULUI.</p>
      <p style="margin-bottom:28px;text-align:justify;"><strong>4.</strong> Prezentul act de predare-primire a lucrărilor executate intră în vigoare din momentul semnării.</p>

      <table style="width:100%;border-collapse:collapse;font-size:10pt;">
        <tr>
          <td style="width:50%;vertical-align:top;padding-right:20px;">
            <strong>${firmDisplay}</strong><br>
            ${coordinator ? `BUNPartener<br>` : ''}
            ${idno ? `IDNO: ${idno}<br>` : ''}
            ${ibanMdl ? `IBAN: ${ibanMdl} (MDL)<br>` : ''}
            ${bank ? `${bank}<br>` : ''}
            <br><br>
            __________________________________________<br>
            <span style="font-size:9pt;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(semnătura)</span><br>
            ${coordinator ? `Nume, prenume: <strong>${coordinator}</strong><br>Poziția: avocat coordonator` : ''}
          </td>
          <td style="width:50%;vertical-align:top;padding-left:20px;">
            ${clientDet ? `<strong>${clientDisplay}</strong><br>${clientDet.replace(/,\s*/g, ',<br>')}` : `<strong>${clientDisplay}</strong>`}
            <br><br>
            __________________________________________<br>
            <span style="font-size:9pt;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(semnătura)</span><br>
            Nume, prenume: <strong>${clientDisplay}</strong><br>Poziția: client
          </td>
        </tr>
      </table>
    </div>
  `;

  document.getElementById('modal-overlay').style.display = 'flex';
}

async function downloadDocx() {
  const el = document.getElementById('act-document');
  if (!el) return;
  const settings = JSON.parse(localStorage.getItem('pontaj_settings') || '{}');
  const slug = (settings.lastClient || 'client').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const date = new Date().toISOString().split('T')[0];

  const clone = el.cloneNode(true);
  // logo img already contains a base64 data URL — no fetch needed

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>
    body { font-family: 'Times New Roman', serif; font-size: 11pt; line-height: 1.5; margin: 0; }
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #000; padding: 4px 6px; font-size: 10pt; }
    th { text-align: center; font-size: 9pt; text-transform: uppercase; }
  </style></head><body>${clone.outerHTML}</body></html>`;

  const docBlob = new Blob(['﻿', html], { type: 'application/msword' });
  saveAs(docBlob, `act-predare-primire-${slug}-${date}.doc`);
}

function downloadReport() {
  const el = document.getElementById('act-document');
  if (!el) return;
  const now      = new Date();
  const date     = now.toISOString().split('T')[0];
  const settings = JSON.parse(localStorage.getItem('pontaj_settings') || '{}');
  const slug     = (settings.lastClient || 'client').toLowerCase()
                     .replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  html2pdf().set({
    margin: [15, 18, 15, 18],
    filename: `act-predare-primire-${slug}-${date}.pdf`,
    image:    { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#ffffff' },
    jsPDF:    { unit: 'mm', format: 'a4', orientation: 'portrait' },
  }).from(el).save();
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
